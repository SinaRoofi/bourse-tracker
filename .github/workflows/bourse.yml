name: Bourse Tracker

on:
  workflow_dispatch:
  repository_dispatch:
    types: [run-tracker]

concurrency:
  group: bourse-tracker
  cancel-in-progress: false

jobs:
  run-bourse-tracker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Dependencies
        run: pip install --no-cache-dir --disable-pip-version-check -q -r requirements.txt

      - name: Test BRS API
        env:
          BRSAPI_KEY: ${{ secrets.BRSAPI_KEY }}
        run: |
          curl -L -v \
            --connect-timeout 10 \
            --max-time 35 \
            "https://Api.BrsApi.ir/Tsetmc/AllSymbols.php?key=$BRSAPI_KEY"

      - name: Run Filters
        run: python main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          BRSAPI_KEY: ${{ secrets.BRSAPI_KEY }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

      - name: Send Daily Summary
        run: python daily_summary_main.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}

      - if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ github.run_number }}
          path: |
            bourse_tracker.log
            daily_summary.log
          retention-days: 2
          compression-level: 9
